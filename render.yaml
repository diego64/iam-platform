# Blueprint do Render.
#
# A tag da imagem é substituída pelo pipeline a cada promoção. Nunca
# usar `latest`: tag mutável torna o rollback não determinístico, porque a versão
# que estava rodando deixa de ser recuperável por tag.
services:
  - type: web
    name: iam-platform
    runtime: image
    image:
      url: ghcr.io/diego64/iam-platform:sha-PLACEHOLDER
    plan: starter
    region: oregon

    # Readiness, não liveness. Liveness responde 200 com PostgreSQL e MongoDB fora —
    # apontado para ele, o Render promovia um deploy incapaz de atender. Sem ambiente de
    # homologação, esta sonda é o primeiro e único ponto em que isso é detectado antes
    # de servir tráfego.
    healthCheckPath: /health/ready

    # Roda uma vez, antes de trocar o tráfego. No entrypoint do container, N
    # réplicas subindo em paralelo executariam a migração N vezes.
    preDeployCommand: pnpm migrate

    # Promoção é do pipeline, não do push. Deploy automático em push tira do
    # gate de qualidade o poder de barrar uma versão.
    autoDeploy: false

    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: MONGODB_DB
        value: iam_sessions
      - key: SHUTDOWN_TIMEOUT_MS
        value: '10000'

      # Observabilidade. METRICS_PUBLIC fica false: /metrics expõe topologia, nomes de
      # rota e volume de tráfego, e no Render o serviço só tem endereço público — abrir
      # exige decisão explícita, registrada aqui, não um default que ninguém escolheu.
      - key: METRICS_ENABLED
        value: 'true'
      - key: METRICS_PUBLIC
        value: 'false'
      - key: OTEL_SERVICE_NAME
        value: iam-platform
      # 10% em produção: amostrar tudo custa caro sem responder pergunta que a amostra
      # já responde.
      - key: OTEL_TRACES_SAMPLER_ARG
        value: '0.1'
      # Endpoint do Collector e commit da imagem entram pelo pipeline/painel.
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: GIT_COMMIT
        sync: false

      # sync: false ⇒ o valor é definido no painel/secret manager e nunca entra
      # neste arquivo, que é versionado.
      - key: POSTGRES_URL
        sync: false
      - key: MONGODB_URL
        sync: false
