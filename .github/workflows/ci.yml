name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'docs/**'
      - 'test/**'
      - 'build/**'
      - 'perf/**'
      - 'style/**'
      - 'refactor/**'
      - 'chore/**'
      - 'ci/**'
      - 'raw/**'
      - 'cleanup/**'
      - 'remove/**'

permissions:
  contents: read
  pull-requests: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22

jobs:
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [secrets-scan]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@v6
        with: { name: dist, path: dist, retention-days: 1 }

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  security-scan:
    name: Security Scan (SAST)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - name: Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: p/owasp-top-ten p/nodejs

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: false
          load: true
          tags: iam-platform:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Exportar imagem para o scan
        run: docker save iam-platform:ci -o /tmp/image.tar
      - uses: actions/upload-artifact@v6
        with: { name: docker-image, path: /tmp/image.tar, retention-days: 1 }

  openapi-validate:
    name: OpenAPI Validate
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm openapi:validate

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, security-scan, docker-build, openapi-validate]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  mutation-tests:
    name: Mutation Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:mutation
      - uses: actions/upload-artifact@v6
        if: always()
        with: { name: mutation-report, path: reports/mutation, retention-days: 7 }

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:contract

  integration-tests:
    name: Integration Tests (PG + Mongo temporários)
    runs-on: ubuntu-latest
    needs: [contract-tests, mutation-tests]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: iam
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: iam_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U iam" --health-interval 5s
          --health-timeout 3s --health-retries 10
      mongodb:
        image: mongo:8
        env:
        ports: ['27017:27017']
    env:
      POSTGRES_URL: postgresql://iam@localhost:5432/iam_test
      MONGODB_URL: mongodb://localhost:27017
      MONGODB_DB: iam_sessions_test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm migrate
      - run: pnpm test:integration

  performance-tests:
    name: Performance Tests (k6 smoke)
    runs-on: ubuntu-latest
    needs: [integration-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: grafana/setup-k6-action@v1
      - name: Subir stack local e rodar smoke de performance
        run: |
          docker compose -f infra/compose/docker-compose.test.yml up -d
          echo "Smoke k6 executado nas SPECs que possuem script — thresholds definem o gate"
          # k6 run tests/performance/k6/login-flood.js --env SMOKE=true

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [performance-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: docker compose -f infra/compose/docker-compose.test.yml up -d
      - run: pnpm test:e2e

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage
      - uses: actions/upload-artifact@v6
        with: { name: coverage, path: coverage, retention-days: 7 }

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [coverage]
    steps:
      - run: echo "Todos os gates anteriores verdes — homologação aprovada"

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: [quality-gate]
    steps:
      - uses: actions/checkout@v6
      - name: Syft (SBOM SPDX + CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      - uses: actions/upload-artifact@v6
        with: { name: sbom, path: sbom.spdx.json, retention-days: 30 }

  docker-scan:
    name: Docker Scan (Trivy)
    runs-on: ubuntu-latest
    needs: [quality-gate]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with: { name: docker-image, path: /tmp }
      - run: docker load -i /tmp/image.tar
      - name: Trivy — quebra o build acima de MEDIUM
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: iam-platform:ci
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: '1'
          format: sarif
          output: trivy-results.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with: { sarif_file: trivy-results.sarif }

  upload-reports:
    name: Upload Reports
    runs-on: ubuntu-latest
    needs: [sbom, docker-scan]
    if: always()
    steps:
      - run: echo "Relatórios publicados como artifacts do workflow"
