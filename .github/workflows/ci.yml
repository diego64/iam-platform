name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'docs/**'
      - 'test/**'
      - 'build/**'
      - 'perf/**'
      - 'style/**'
      - 'refactor/**'
      - 'chore/**'
      - 'ci/**'
      - 'raw/**'
      - 'cleanup/**'
      - 'remove/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22

jobs:
  # Definição única em security.yml. Antes, estes jobs existiam aqui E lá, e cada PR
  # exibia o mesmo check duas vezes com nomes diferentes.
  seguranca:
    name: Segurança
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read
      security-events: write
      pull-requests: write

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [seguranca]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/upload-artifact@v6
        with: { name: dist, path: dist, retention-days: 1 }

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: false
          load: true
          tags: iam-platform:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Exportar imagem para o scan
        run: docker save iam-platform:ci -o /tmp/image.tar
      - uses: actions/upload-artifact@v6
        with: { name: docker-image, path: /tmp/image.tar, retention-days: 1 }

  openapi-validate:
    name: OpenAPI Validate
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm openapi:validate

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [lint, docker-build, openapi-validate]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  contract-tests:
    name: Contract Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:contract

  integration-tests:
    name: Integration Tests (PG + Mongo temporários)
    runs-on: ubuntu-latest
    needs: [contract-tests]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: iam
          POSTGRES_DB: iam_test
          # Container efêmero, isolado no job: senha aqui não protege nada e produz
          # uma URI com forma de credencial, que o scanner de segredos sinaliza.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U iam" --health-interval 5s
          --health-timeout 3s --health-retries 10
      mongodb:
        image: mongo:8
        ports: ['27017:27017']
    env:
      POSTGRES_URL: postgresql://iam@localhost:5432/iam_test
      MONGODB_URL: mongodb://localhost:27017
      MONGODB_DB: iam_sessions_test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # tests/integration/server/bootstrap.test.ts sobe dist/server.js como processo
      # filho para exercitar os caminhos de saída do boot — precisa do build.
      - run: pnpm build
      - run: pnpm migrate
      - run: pnpm test:integration

  performance-tests:
    name: Performance Tests (k6 smoke)
    runs-on: ubuntu-latest
    needs: [integration-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: grafana/setup-k6-action@v1
      - name: Subir stack local e rodar smoke de performance
        run: |
          docker compose -f infra/compose/docker-compose.test.yml up -d
          echo "Smoke k6 executado nas SPECs que possuem script — thresholds definem o gate"
          # k6 run tests/performance/k6/login-flood.js --env SMOKE=true

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [performance-tests]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: docker compose -f infra/compose/docker-compose.test.yml up -d
      - run: pnpm test:e2e

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    # test:coverage roda a suíte INTEIRA (sem --dir), então precisa da mesma infra do
    # job de integração. Medir cobertura só dos unitários daria um número que não
    # corresponde ao que a suíte de fato exercita.
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: iam
          POSTGRES_DB: iam_test
          # Container efêmero, isolado no job: senha aqui não protege nada e produz
          # uma URI com forma de credencial, que o scanner de segredos sinaliza.
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U iam" --health-interval 5s
          --health-timeout 3s --health-retries 10
      mongodb:
        image: mongo:8
        ports: ['27017:27017']
    env:
      POSTGRES_URL: postgresql://iam@localhost:5432/iam_test
      MONGODB_URL: mongodb://localhost:27017
      MONGODB_DB: iam_sessions_test
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # bootstrap.test.ts sobe dist/server.js como processo filho.
      - run: pnpm build
      - run: pnpm migrate
      - run: pnpm test:coverage
      - uses: actions/upload-artifact@v6
        with: { name: coverage, path: coverage, retention-days: 7 }

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [coverage]
    steps:
      - run: echo "Todos os gates anteriores verdes — homologação aprovada"

  upload-reports:
    name: Upload Reports
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: always()
    steps:
      - run: echo "Relatórios publicados como artifacts do workflow"
