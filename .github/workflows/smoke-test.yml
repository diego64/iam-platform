name: Smoke Test (Manual)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL base do ambiente'
        required: true

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/healthcheck.sh "${{ inputs.base_url }}" --smoke
