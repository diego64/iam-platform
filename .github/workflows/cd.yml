name: CD - Produção

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write # Cosign keyless

concurrency:
  group: cd-producao
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.push.outputs.digest }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest
      - id: push
        name: Push GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cosign-sign:
    name: Cosign Sign
    runs-on: ubuntu-latest
    needs: [build-docker]
    steps:
      - uses: sigstore/cosign-installer@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Assinatura keyless (OIDC)
        run: cosign sign --yes ${{ env.IMAGE }}@${{ needs.build-docker.outputs.digest }}

  trivy-scan:
    name: Trivy Scan (imagem publicada)
    runs-on: ubuntu-latest
    needs: [cosign-sign, build-docker]
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE }}@${{ needs.build-docker.outputs.digest }}
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: '1'

  backup:
    name: Backup Banco (pré-deploy)
    runs-on: ubuntu-latest
    needs: [trivy-scan]
    steps:
      - uses: actions/checkout@v6
      - name: Backup PostgreSQL (Supabase) + MongoDB (Atlas)
        env:
          POSTGRES_URL: ${{ secrets.PROD_POSTGRES_URL }}
          MONGODB_URL: ${{ secrets.PROD_MONGODB_URL }}
        run: bash scripts/backup.sh

  validate-migration:
    name: Validar Migration
    runs-on: ubuntu-latest
    needs: [backup]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Dry-run das migrations contra o banco de produção
        env:
          POSTGRES_URL: ${{ secrets.PROD_POSTGRES_URL }}
        run: pnpm migrate -- --dry-run

  deploy:
    name: Deploy (Render)
    runs-on: ubuntu-latest
    needs: [validate-migration]
    environment: production
    steps:
      - name: Disparar deploy no Render
        run: |
          curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - uses: actions/checkout@v6
      - name: Aguardar e validar endpoints críticos
        env:
          BASE_URL: ${{ secrets.PROD_BASE_URL }}
        run: bash scripts/healthcheck.sh "$BASE_URL" --smoke

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [smoke-test]
    steps:
      - uses: actions/checkout@v6
      - env:
          BASE_URL: ${{ secrets.PROD_BASE_URL }}
        run: bash scripts/healthcheck.sh "$BASE_URL"

  create-release:
    name: Criar Release
    runs-on: ubuntu-latest
    needs: [health-check, build-docker]
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: Criar tag de release (dispara release.yml)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION=$(node -p "require('./package.json').version")
          git tag -f "v${VERSION}"
          git push -f origin "v${VERSION}"

  notify:
    name: Notificar
    runs-on: ubuntu-latest
    needs: [create-release]
    if: always()
    steps:
      - name: Resumo do deploy
        run: |
          echo "Deploy de produção finalizado: ${{ needs.create-release.result }}"
