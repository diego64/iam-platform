name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-producao
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-docker:
    name: Build Docker
    runs-on: ubuntu-latest
    permissions:
      packages: write
    outputs:
      # Identidade imutável do artefato: TODO job seguinte referencia por aqui.
      digest: ${{ steps.push.outputs.digest }}
      # Referência completa, pronta para uso — evita recompor a string em cada job.
      imagem: ${{ env.IMAGE }}@${{ steps.push.outputs.digest }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # `latest` NÃO é publicado. Tag mutável torna o rollback não determinístico:
          # o que estava rodando deixa de ser recuperável, porque o ponteiro já andou.
          # A promoção referencia digest; a tag sha- serve só para leitura humana.
          tags: |
            type=sha,prefix=sha-
      - name: Confirmar que nenhuma tag mutável foi gerada
        run: |
          if echo '${{ steps.meta.outputs.tags }}' | grep -qE '(:latest|:main|:stable)$'; then
            echo "Tag mutável gerada: ${{ steps.meta.outputs.tags }}" >&2
            exit 1
          fi
          echo "Tags: ${{ steps.meta.outputs.tags }}"
      - id: push
        name: Push GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy-scan:
    name: Trivy Scan (imagem publicada)
    runs-on: ubuntu-latest
    needs: [build-docker]
    steps:
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-docker.outputs.imagem }}
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

  cosign-sign:
    name: Cosign Sign
    runs-on: ubuntu-latest
    permissions:
      packages: write
      id-token: write # assinatura keyless via OIDC
    # DEPOIS do scan, não antes. A assinatura atesta que o artefato passou pelos
    # controles; produzi-la antes deixaria uma imagem reprovada assinada no registry,
    # e a assinatura passaria a significar apenas "foi construída aqui".
    needs: [build-docker, trivy-scan]
    steps:
      - uses: sigstore/cosign-installer@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Assinatura keyless (OIDC)
        run: cosign sign --yes ${{ needs.build-docker.outputs.imagem }}

  publicar-elegivel:
    name: Digest elegível para promoção
    runs-on: ubuntu-latest
    needs: [build-docker, trivy-scan, cosign-sign]
    steps:
      - name: Registrar o artefato aprovado
        run: |
          {
            echo "## Artefato elegível para promoção"
            echo
            echo "| Campo | Valor |"
            echo "|---|---|"
            echo "| digest | \`${{ needs.build-docker.outputs.digest }}\` |"
            echo "| imagem | \`${{ needs.build-docker.outputs.imagem }}\` |"
            echo "| versão | ${{ needs.build-docker.outputs.version }} |"
            echo "| commit | ${{ github.sha }} |"
            echo
            echo "Construído, escaneado e assinado. **Nenhum deploy acontece aqui**:"
            echo "a promoção exige aprovação humana em \`promote.yml\`."
          } >> "$GITHUB_STEP_SUMMARY"

  notificar:
    name: Notificar
    runs-on: ubuntu-latest
    needs: [build-docker, trivy-scan, cosign-sign, publicar-elegivel]
    # `if: always()` sozinho não basta: com needs no meio da cadeia, o job é *skipped*
    # quando algo antes falha, e a falha passa silenciosa. Depende de TODOS os jobs.
    if: always()
    steps:
      - name: Resumo
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::Pipeline de entrega falhou antes de produzir digest elegível."
            exit 1
          fi
          echo "Digest elegível: ${{ needs.build-docker.outputs.digest }}"
