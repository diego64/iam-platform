name: Limpeza

on:
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:

permissions:
  actions: write
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Excluir cache antigo
        uses: actions/github-script@v9
        with:
          script: |
            const caches = await github.rest.actions.getActionsCacheList({ ...context.repo, per_page: 100 });
            for (const c of caches.data.actions_caches) {
              if (Date.now() - new Date(c.last_accessed_at) > 7 * 864e5) {
                await github.rest.actions.deleteActionsCacheById({ ...context.repo, cache_id: c.id });
              }
            }
      - name: Excluir imagens antigas do GHCR (mantém 10)
        uses: actions/delete-package-versions@v5
        with:
          package-name: iam-platform
          package-type: container
          min-versions-to-keep: 10
          delete-only-untagged-versions: true
      - name: Excluir artefatos antigos
        uses: actions/github-script@v9
        with:
          script: |
            const arts = await github.rest.actions.listArtifactsForRepo({ ...context.repo, per_page: 100 });
            for (const a of arts.data.artifacts) {
              if (Date.now() - new Date(a.created_at) > 14 * 864e5) {
                await github.rest.actions.deleteArtifact({ ...context.repo, artifact_id: a.id });
              }
            }
