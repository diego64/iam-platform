name: Rollback

# Reverte produção para um digest anterior. Disparado à mão durante incidente, ou
# automaticamente pelo promote.yml quando o smoke pós-deploy reprova.
on:
  workflow_dispatch:
    inputs:
      digest_alvo:
        description: 'Imagem para a qual reverter (repo@sha256:...)'
        required: true
        type: string
  workflow_call:
    inputs:
      digest_alvo:
        required: true
        type: string

permissions:
  contents: read

# Serializa com a promoção: reverter enquanto um deploy avança deixaria o serviço em
# estado indefinido, e é justamente durante incidente que os dois se cruzam.
concurrency:
  group: promocao-producao
  cancel-in-progress: false

jobs:
  reverter:
    name: Reverter
    runs-on: ubuntu-latest
    # `producao`, sem acento e sem maiúscula. O workflow anterior dizia `production`,
    # que não existe — e o GitHub CRIA o environment ausente na hora, sem nenhuma regra
    # de proteção. O rollback passaria sem aprovação, silenciosamente.
    environment: producao
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - uses: sigstore/cosign-installer@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Reverter para o digest alvo
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          BASE_URL: ${{ secrets.BASE_URL }}
        run: bash scripts/rollback.sh "${{ inputs.digest_alvo }}"

      - name: Resumo
        if: always()
        run: |
          {
            echo "## Rollback"
            echo
            echo "| Campo | Valor |"
            echo "|---|---|"
            echo "| alvo | \`${{ inputs.digest_alvo }}\` |"
            echo "| disparo | ${{ github.event_name }} |"
            echo "| resultado | ${{ job.status }} |"
            echo
            echo "Banco NÃO foi restaurado: reverter imagem é reversível, restaurar"
            echo "banco é destrutivo e exige decisão humana sobre janela de perda."
          } >> "$GITHUB_STEP_SUMMARY"
