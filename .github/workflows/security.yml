name: Segurança

# Workflow reutilizável: é a definição ÚNICA dos jobs de segurança.
# O ci.yml o invoca por workflow_call em vez de redefinir os mesmos jobs — antes,
# secret scan, dependency review, SAST, container scan e SBOM existiam nos dois
# arquivos e rodavam duas vezes por PR, com nomes diferentes para o mesmo trabalho.
on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        # fetch-depth 0: o TruffleHog varre o histórico, não só o estado final.
        # Corrigir um arquivo não remove o segredo do commit que o introduziu.
        with: { fetch-depth: 0 }
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          # Aspas obrigatórias: em fluxo YAML a vírgula encerra o valor, e
          # `{ extra_args: --results=verified, unknown }` virava
          # `extra_args: --results=verified` mais uma chave inválida `unknown`,
          # deixando o scanner menos estrito do que a intenção declarada.
          extra_args: '--results=verified,unknown'

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: moderate
          # Deixa a decisão visível na revisão em vez de enterrada no log.
          comment-summary-in-pr: on-failure

  license-scan:
    name: License Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Bloquear licenças copyleft fortes
        run: pnpm dlx license-checker-rseidelsohn --failOn 'GPL-3.0;AGPL-3.0' --summary

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: semgrep/semgrep-action@v1
        with:
          config: 'p/owasp-top-ten p/nodejs p/jwt'

  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile
          push: false
          load: true
          tags: 'iam:sec'
      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'iam:sec'
          # Aspas obrigatórias, mesmo motivo do TruffleHog: sem elas o valor era
          # apenas MEDIUM, e HIGH e CRITICAL viravam chaves inválidas — o gate
          # reprovava por MEDIUM e ignorava exatamente o que deveria barrar.
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: [container-scan]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: security/sbom/sbom.cdx.json
      - uses: actions/upload-artifact@v6
        with:
          name: sbom-cyclonedx
          path: security/sbom/sbom.cdx.json
          retention-days: 30
