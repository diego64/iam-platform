name: Segurança

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - uses: trufflesecurity/trufflehog@main
        with: { extra_args: --results=verified, unknown }

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/dependency-review-action@v5
        with: { fail-on-severity: moderate }

  license-scan:
    name: License Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Bloquear licenças copyleft fortes
        run: pnpm dlx license-checker-rseidelsohn --failOn 'GPL-3.0;AGPL-3.0' --summary

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: semgrep/semgrep-action@v1
        with: { config: p/owasp-top-ten p/nodejs p/jwt }

  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/build-push-action@v6
        with: { context: ., file: infra/docker/Dockerfile, push: false, load: true, tags: iam:sec }
      - uses: aquasecurity/trivy-action@master
        with: { image-ref: 'iam:sec', severity: MEDIUM, HIGH, CRITICAL, exit-code: '1' }

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: [container-scan]
    steps:
      - uses: actions/checkout@v6
      - uses: anchore/sbom-action@v0
        with: { format: cyclonedx-json, output-file: security/sbom/sbom.cdx.json }
      - uses: actions/upload-artifact@v6
        with: { name: sbom-cyclonedx, path: security/sbom/sbom.cdx.json }
