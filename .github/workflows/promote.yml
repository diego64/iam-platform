name: Promover para Produção

# Sem ambiente de homologação, a aprovação humana neste workflow é a ÚNICA barreira
# entre um artefato e o tráfego de produção. Por isso o `environment: producao` não é
# decoração: é ele que exige o reviewer e que mantém os secrets fora de qualquer job
# que não tenha passado pela aprovação.
on:
  workflow_dispatch:
    inputs:
      digest:
        description: 'Digest construído, escaneado e assinado na main (sha256:...)'
        required: true
        type: string
      pular_backup:
        description: 'Pular backup pré-deploy (apenas para incidente declarado)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Uma promoção por vez, e sem cancelar a que está em andamento: interromper um deploy
# no meio deixa o serviço em estado indefinido.
concurrency:
  group: promocao-producao
  cancel-in-progress: false

env:
  IMAGEM: ghcr.io/${{ github.repository }}@${{ inputs.digest }}

jobs:
  validar:
    name: Validar artefato
    runs-on: ubuntu-latest
    # Sem `environment` aqui de propósito: a validação não precisa de secret algum e
    # roda antes da aprovação, para o operador saber que o digest é inválido sem
    # precisar acordar um reviewer.
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - uses: sigstore/cosign-installer@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Formato, existência no registry e assinatura
        run: bash scripts/verify-artifact.sh "${{ env.IMAGEM }}"

  promover:
    name: Promover
    runs-on: ubuntu-latest
    needs: [validar]
    environment: producao # exige aprovação; os secrets só resolvem aqui
    permissions:
      contents: read
    outputs:
      digest_anterior: ${{ steps.anterior.outputs.digest }}
    steps:
      - uses: actions/checkout@v6

      - id: anterior
        name: Registrar o digest em produção antes da troca
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          # Capturado ANTES de qualquer mudança: é o alvo do rollback se o smoke falhar.
          # Descobrir para onde voltar depois que o deploy já trocou é tarde demais.
          atual=$(curl -fsS "https://api.render.com/v1/services/${RENDER_SERVICE_ID}" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            | sed -n 's/.*"imagePath"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
          echo "digest=${atual}" >> "$GITHUB_OUTPUT"
          echo "Produção serve hoje: ${atual:-desconhecido}"

      - name: Backup de PostgreSQL e MongoDB
        if: ${{ !inputs.pular_backup }}
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          MONGODB_URL: ${{ secrets.MONGODB_URL }}
        run: bash scripts/backup.sh --all

      - name: Apontar o serviço para o digest e aguardar o deploy
        id: deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: bash scripts/render-deploy.sh "${{ env.IMAGEM }}"

      - name: Smoke contra a URL pública
        id: smoke
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        run: bash scripts/healthcheck.sh "$BASE_URL"

      - name: Resumo
        if: always()
        run: |
          {
            echo "## Promoção"
            echo
            echo "| Campo | Valor |"
            echo "|---|---|"
            echo "| imagem | \`${{ env.IMAGEM }}\` |"
            echo "| anterior | \`${{ steps.anterior.outputs.digest }}\` |"
            echo "| deploy_id | ${{ steps.deploy.outputs.deploy_id }} |"
            echo "| duracao_s | ${{ steps.deploy.outputs.duracao_s }} |"
            echo "| resultado | ${{ job.status }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  reverter:
    name: Rollback automático
    needs: [promover]
    # Só quando a promoção falhou E existe alvo conhecido. Sem homologação, o smoke em
    # produção é a primeira execução real do artefato — se ele reprova, o tráfego já
    # está sendo servido por uma versão que não passou na verificação.
    if: failure() && needs.promover.outputs.digest_anterior != ''
    uses: ./.github/workflows/rollback.yml
    with:
      digest_alvo: ${{ needs.promover.outputs.digest_anterior }}
    secrets: inherit

  notificar:
    name: Notificar
    runs-on: ubuntu-latest
    needs: [validar, promover, reverter]
    # Depende de TODOS os jobs e roda sempre: com needs parcial, este job seria
    # *skipped* justamente quando algo falhasse, que é quando o aviso importa.
    if: always()
    steps:
      - name: Resultado da promoção
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::Promoção falhou. Anterior: ${{ needs.promover.outputs.digest_anterior }}"
            echo "::notice::Rollback automático: ${{ needs.reverter.result }}"
            exit 1
          fi
          echo "Promoção concluída: ${{ env.IMAGEM }}"
