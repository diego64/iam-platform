name: Performance (k6)

on:
  schedule:
    - cron: '0 2 * * 3'
  workflow_dispatch:

jobs:
  k6:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env: { POSTGRES_USER: iam, POSTGRES_PASSWORD: iam_test, POSTGRES_DB: iam_test }
        ports: ['5432:5432']
      mongodb:
        image: mongo:8
        env: { MONGO_INITDB_ROOT_USERNAME: iam, MONGO_INITDB_ROOT_PASSWORD: iam_test }
        ports: ['27017:27017']
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile && pnpm build
      - name: Subir API e rodar cenários k6
        env:
          POSTGRES_URL: postgresql://iam:iam_test@localhost:5432/iam_test
          MONGODB_URL: mongodb://iam:iam_test@localhost:27017
        run: |
          pnpm migrate && pnpm seed
          node dist/server.js & sleep 3
      - uses: grafana/setup-k6-action@v1
      - run: k6 run tests/performance/k6/login-flood.js
      - run: k6 run tests/performance/k6/token-validation.js
