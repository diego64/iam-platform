name: SBOM

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  sbom:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: anchore/sbom-action@v0
        with: { format: spdx-json, output-file: sbom.spdx.json }
      - uses: anchore/sbom-action@v0
        with: { format: cyclonedx-json, output-file: sbom.cdx.json }
      - name: Anexar SBOM à release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            sbom.spdx.json
            sbom.cdx.json
