openapi: 3.1.0
info:
  title: Custom IAM API
  version: 0.1.0
  contact:
    name: Equipe iam-platform
    url: https://github.com/diego64/iam-platform
  description: >
    Provedor de Identidade (IdP/SSO). Emissão e validação de tokens para microsserviços.
    Autenticação via Bearer Token (JWT EdDSA) e fluxos OAuth2 (password, client_credentials, refresh_token).
tags:
  - name: health
    description: Sondas de disponibilidade consumidas por Docker e Render.
  - name: password
    description: Troca, recuperação e política de senha.
  - name: users
    description: Administração de usuários (CRUD e ciclo de status). Restrito a administradores.
  - name: observability
    description: Exposição de métricas para raspagem pelo Prometheus.
servers:
  - url: http://localhost:3000
    description: Desenvolvimento local
components:
  schemas:
    Dependencia:
      type: object
      additionalProperties: false
      required: [nome, estado, duracao_ms]
      properties:
        nome:
          type: string
          enum: [postgres, mongodb]
        estado:
          type: string
          enum: [up, down]
        duracao_ms:
          type: integer
          minimum: 0
        motivo:
          type: string
          description: >
            Categoria fixa, nunca a mensagem do driver — ela traz host, porta e usuário,
            e esta resposta é pública e sem autenticação.
          enum: [timeout, indisponivel, erro_interno]
    Prontidao:
      type: object
      additionalProperties: false
      required: [status, dependencias]
      properties:
        status:
          type: string
          enum: [ready]
        dependencias:
          type: array
          items: { $ref: '#/components/schemas/Dependencia' }
    Problem:
      type: object
      description: Erro no formato RFC 7807.
      required: [type, title, status]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
    Usuario:
      type: object
      additionalProperties: false
      description: Representação pública do usuário — nunca inclui o hash de senha.
      required: [id, email, status, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        status: { type: string, enum: [active, blocked] }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:
  /health/live:
    get:
      tags: [health]
      summary: Liveness probe
      description: >
        Indica que o processo está vivo. NÃO consulta PostgreSQL nem MongoDB: banco
        fora não se resolve reiniciando o processo. A checagem de dependências é
        readiness (/health/ready), entregue pela SPEC 017.
      operationId: healthLive
      security: []
      responses:
        '200':
          description: Processo vivo
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [status, uptime_seconds]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  uptime_seconds:
                    type: integer
                    minimum: 0
              example:
                status: ok
                uptime_seconds: 1042
        '404':
          description: Recurso não encontrado
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
  /health/ready:
    get:
      tags: [health]
      summary: Readiness probe
      description: >
        Indica se o serviço consegue ATENDER: verifica PostgreSQL e MongoDB.
        Diferente de /health/live, que indica apenas que o processo está vivo — um
        liveness que checasse dependência viraria restart loop e derrubaria também as
        réplicas que ainda serviam.
      operationId: healthReady
      security: []
      responses:
        '200':
          description: Pronto para receber tráfego
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prontidao'
              example:
                status: ready
                dependencias:
                  - { nome: postgres, estado: up, duracao_ms: 3 }
                  - { nome: mongodb, estado: up, duracao_ms: 5 }
        '503':
          description: Dependência indisponível ou instância encerrando
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
              example:
                type: https://iam.example.com/problems/service-unavailable
                title: Serviço indisponível
                status: 503
                detail: 'Dependências indisponíveis: postgres'
  /auth/password/change:
    post:
      tags: [password]
      summary: Troca a senha do usuário autenticado
      description: >
        Exige a senha atual. Em sucesso, revoga todas as sessões do usuário e
        invalida tokens de reset pendentes.
      operationId: passwordChange
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [senha_atual, senha_nova]
              properties:
                senha_atual: { type: string, minLength: 1, maxLength: 128 }
                senha_nova: { type: string, minLength: 12, maxLength: 128 }
      responses:
        '204':
          description: Senha trocada
        '400':
          description: Payload inválido, política reprovada ou senha reutilizada
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '401':
          description: Não autenticado ou senha atual incorreta
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '429':
          description: Limite de tentativas excedido
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
  /auth/password/forgot:
    post:
      tags: [password]
      summary: Solicita a recuperação de senha
      description: >
        Responde 202 sempre, exista o e-mail ou não, para não revelar quais contas
        existem. Para e-mail existente e ativo, envia um token de reset.
      operationId: passwordForgot
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email]
              properties:
                email: { type: string, format: email, maxLength: 254 }
      responses:
        '202':
          description: Requisição aceita (resposta idêntica para e-mail existente ou não)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
        '429':
          description: Limite de tentativas excedido
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
  /auth/password/reset:
    post:
      tags: [password]
      summary: Redefine a senha a partir de um token de reset
      description: >
        Consome o token de reset (uso único). Em sucesso, revoga todas as sessões do
        usuário. Token inválido, expirado ou já usado retornam o mesmo erro genérico.
      operationId: passwordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [token, senha_nova]
              properties:
                token: { type: string, minLength: 43, maxLength: 43 }
                senha_nova: { type: string, minLength: 12, maxLength: 128 }
      responses:
        '204':
          description: Senha redefinida
        '400':
          description: Token inválido/expirado/usado, política reprovada ou senha reutilizada
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '429':
          description: Limite de tentativas excedido
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
  /auth/password/policy:
    get:
      tags: [password]
      summary: Regras vigentes de força de senha
      description: >
        Expõe os parâmetros da política (comprimento e classes exigidas) para o cliente
        montar validação e mensagens; a fonte da verdade continua no servidor.
      operationId: passwordPolicy
      security: []
      responses:
        '200':
          description: Parâmetros da política
          content:
            application/json:
              schema:
                type: object
                properties:
                  min_length: { type: integer }
                  max_length: { type: integer }
                  required_classes: { type: integer }
                  classes:
                    type: array
                    items: { type: string }
                  blocks_common_passwords: { type: boolean }
  /users:
    post:
      tags: [users]
      summary: Cria um usuário
      description: Restrito a administradores. A senha passa pela política e é hasheada; nunca é retornada.
      operationId: usersCreate
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email, senha]
              properties:
                email: { type: string, format: email, maxLength: 254 }
                senha: { type: string, minLength: 12, maxLength: 128 }
      responses:
        '201':
          description: Usuário criado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Usuario' }
        '400':
          description: Payload inválido ou senha fora da política
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '401':
          description: Não autenticado
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '403':
          description: Autenticado sem papel de administrador
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '409':
          description: E-mail já cadastrado
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '429':
          description: Limite de tentativas excedido
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
    get:
      tags: [users]
      summary: Lista usuários com paginação e filtro de status
      description: Restrito a administradores. Ordena do mais recente ao mais antigo.
      operationId: usersList
      security: [{ BearerAuth: [] }]
      parameters:
        - {
            in: query,
            name: limit,
            schema: { type: integer, minimum: 1, maximum: 100, default: 20 },
          }
        - { in: query, name: offset, schema: { type: integer, minimum: 0, default: 0 } }
        - { in: query, name: status, schema: { type: string, enum: [active, blocked] } }
      responses:
        '200':
          description: Página de usuários
          content:
            application/json:
              schema:
                type: object
                required: [items, total, limit, offset]
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Usuario' }
                  total: { type: integer }
                  limit: { type: integer }
                  offset: { type: integer }
        '401':
          description: Não autenticado
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '403':
          description: Autenticado sem papel de administrador
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
  /users/{id}:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [users]
      summary: Busca um usuário por id
      description: Restrito a administradores. Retorna o DTO público, sem hash de senha.
      operationId: usersGet
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Usuário
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Usuario' }
        '401':
          description: Não autenticado
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '403':
          description: Autenticado sem papel de administrador
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '404':
          description: Usuário não encontrado
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
    patch:
      tags: [users]
      summary: Atualiza o e-mail de um usuário
      description: Restrito a administradores. Único campo mutável por aqui é o e-mail.
      operationId: usersUpdate
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [email]
              properties:
                email: { type: string, format: email, maxLength: 254 }
      responses:
        '200':
          description: Usuário atualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Usuario' }
        '400':
          description: Payload inválido
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '404':
          description: Usuário não encontrado
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '409':
          description: E-mail já cadastrado
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
    delete:
      tags: [users]
      summary: Remove um usuário e revoga suas sessões
      description: Restrito a administradores. Hard delete; user_roles e password_history caem por cascade.
      operationId: usersDelete
      security: [{ BearerAuth: [] }]
      responses:
        '204':
          description: Usuário removido
        '401':
          description: Não autenticado
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '403':
          description: Autenticado sem papel de administrador
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '404':
          description: Usuário não encontrado
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
  /users/{id}/block:
    post:
      tags: [users]
      summary: Bloqueia um usuário e revoga suas sessões
      description: Idempotente. Bloquear derruba todas as sessões vivas do usuário.
      operationId: usersBlock
      security: [{ BearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Estado de bloqueio do usuário
          content:
            application/json:
              schema:
                type: object
                required: [id, status]
                properties:
                  id: { type: string, format: uuid }
                  status: { type: string, enum: [blocked] }
        '404':
          description: Usuário não encontrado
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
  /users/{id}/unblock:
    post:
      tags: [users]
      summary: Desbloqueia um usuário
      description: Restrito a administradores. Idempotente. Não recria sessões.
      operationId: usersUnblock
      security: [{ BearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Estado do usuário
          content:
            application/json:
              schema:
                type: object
                required: [id, status]
                properties:
                  id: { type: string, format: uuid }
                  status: { type: string, enum: [active] }
        '404':
          description: Usuário não encontrado
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
  /metrics:
    get:
      tags: [observability]
      summary: Métricas em formato Prometheus
      description: >
        Registrado apenas quando METRICS_ENABLED=true; caso contrário a rota não existe e
        o 404 sai do handler padrão. Em produção, com METRICS_PUBLIC=false, requisição
        vinda do proxy público também recebe 404 — o endpoint expõe topologia, nomes de
        rota e volume de tráfego, e um 403 confirmaria a quem varre que ele existe.
      operationId: metrics
      security: []
      responses:
        '200':
          description: Métricas em formato de exposição do Prometheus
          content:
            text/plain:
              schema:
                type: string
              example: |
                # HELP iam_build_info Versão em execução
                # TYPE iam_build_info gauge
                iam_build_info{version="0.1.0",commit="e54a0fd",node_version="v22.14.0"} 1
        '404':
          description: Métricas desabilitadas por configuração ou requisição externa recusada
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
