openapi: 3.1.0
info:
  title: Custom IAM API
  version: 0.1.0
  description: >
    Provedor de Identidade (IdP/SSO). Emissão e validação de tokens para microsserviços.
    Autenticação via Bearer Token (JWT EdDSA) e fluxos OAuth2 (password, client_credentials, refresh_token).
servers:
  - url: http://localhost:3000
    description: Desenvolvimento local
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths: {}
