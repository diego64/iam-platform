name: iam-platform-test
services:
  postgres:
    image: postgres:17-alpine
    environment: { POSTGRES_USER: iam, POSTGRES_PASSWORD: iam_test, POSTGRES_DB: iam_test }
    ports: ["55432:5432"]
    tmpfs: [/var/lib/postgresql/data]
  mongodb:
    image: mongo:8
    environment: { MONGO_INITDB_ROOT_USERNAME: iam, MONGO_INITDB_ROOT_PASSWORD: iam_test }
    ports: ["57017:27017"]
    tmpfs: [/data/db]
