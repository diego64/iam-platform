# Ambiente local de desenvolvimento: apenas as dependências.
# A aplicação roda no host via `pnpm dev` — ver infra/docker/Dockerfile.dev.
#
# Portas publicadas só em 127.0.0.1: banco de desenvolvimento não pode ficar
# acessível na rede local.
name: iam-platform

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ['127.0.0.1:5432:5432']
    volumes:
      - pg_data:/var/lib/postgresql/data
      # init.sql roda só em volume vazio — é bootstrap de dev, nunca fonte de
      # verdade de schema. DDL versionado vive em src/database/migrations/.
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 10

  mongodb:
    image: mongo:8
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    ports: ['127.0.0.1:27017:27017']
    volumes:
      - mongo_data:/data/db
      - ../mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data:
  mongo_data:
